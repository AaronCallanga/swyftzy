spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/swyftzy}
    username: ${DB_USERNAME:swyftzy}
    password: ${DB_PASSWORD:swyftzy}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:true}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

