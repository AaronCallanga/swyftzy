services:
  postgres:
    image: postgres:17-alpine
    container_name: swyftzy-db
    environment:
      POSTGRES_DB: swyftzy
      POSTGRES_USER: swyftzy
      POSTGRES_PASSWORD: swyftzy
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swyftzy -d swyftzy"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - swyftzy-network

  app:
    image: ghcr.io/aaroncallanga/swyftzy:latest
    container_name: swyftzy-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/swyftzy
      SPRING_DATASOURCE_USERNAME: swyftzy
      SPRING_DATASOURCE_PASSWORD: swyftzy
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swyftzy-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:

networks:
  swyftzy-network:
    driver: bridge
