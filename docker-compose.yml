services:
  postgres:
    image: postgres:17
    container_name: swyftzy-db
    environment:
      POSTGRES_DB: swyftzy
      POSTGRES_USER: swyftzy
      POSTGRES_PASSWORD: swyftzy
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data-swyftzy:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swyftzy -d swyftzy"]
      interval: 5s
      timeout: 5s
      retries: 5
